name: Publish to GitHub Pages

# Mirrors main to the gh-pages branch. GitHub Pages serves the site from
# gh-pages ("deploy from a branch"), which self-enables without admin
# permissions — the GITHUB_TOKEN only needs contents:write.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
